<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>404 - Page Not Found | Max Crafter YT</title>

    <meta name="description" content="Oops! The page you're looking for doesn't exist. Explore Max Crafter YT's website instead.">
    <meta name="robots" content="noindex">

    <link rel="icon" href="favicon/favicon.ico">
    <link rel="stylesheet" href="css/styles.css">

    <style>
        body{
            margin:0;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#4f6df5,#7b4cc2);
            color:#fff;
            font-family:system-ui,sans-serif;
        }

        .error-card{
            width:min(700px,90%);
            text-align:center;
            padding:60px 40px;
            background:rgba(255,255,255,.08);
            backdrop-filter:blur(12px);
            border-radius:20px;
            box-shadow:0 15px 40px rgba(0,0,0,.25);
        }

        h1{
            font-size:7rem;
            margin:0;
            line-height:1;
        }

        h2{
            margin:20px 0 15px;
            font-size:2rem;
        }

        p{
            color:#f1f1f1;
            line-height:1.7;
            margin-bottom:35px;
        }

        .buttons{
            display:flex;
            justify-content:center;
            gap:15px;
            flex-wrap:wrap;
        }

        .btn404{
            display:inline-block;
            padding:14px 28px;
            border-radius:10px;
            text-decoration:none;
            font-weight:600;
            transition:.25s;
        }

        .home{
            background:#fff;
            color:#4f6df5;
        }

        .projects{
            border:2px solid #fff;
            color:#fff;
        }

        .btn404:hover{
            transform:translateY(-3px);
        }

        .emoji{
            font-size:70px;
            margin-bottom:20px;
        }
    </style>
</head>
<body>

<div class="error-card">

    <div class="emoji">🚧</div>

    <h1>404</h1>

    <h2>Page Not Found</h2>

    <p>
        Sorry, the page you're looking for doesn't exist,
        may have been moved, or the link is incorrect.
    </p>

    <div class="buttons">
        <a href="/" class="btn404 home">🏠 Home</a>
        <a href="/projects.html" class="btn404 projects">💻 Projects</a>
        <a href="/videos.html" class="btn404 projects">🎥 Videos</a>
        <a href="/contact.html" class="btn404 projects">📬 Contact</a>
    </div>

</div>

<script>
const messages = [
    "Looks like this page rage quit.",
    "The page went AFK.",
    "Even our Roblox character couldn't find this page.",
    "404... maybe the creeper blew it up.",
    "This page escaped into the void.",
    "Nothing to see here... yet!"
];

document.querySelector("p").textContent =
    messages[Math.floor(Math.random()*messages.length)];
</script>

</body>
</html>
